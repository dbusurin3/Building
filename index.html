<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПИК · Чистое небо</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            overflow: hidden; background: #030614;
            font-family: 'Montserrat', sans-serif;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        
        #ui {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #hud {
            display: flex; justify-content: center; gap: 20px; padding: 20px 25px;
            background: linear-gradient(to bottom, #0b111f 0%, #0b111f 100%);
            border-bottom: 2px solid #2a3a5a;
        }
        .panel {
            background: #111b2e; border: 1px solid #3e5670; 
            padding: 12px 24px; border-radius: 16px; color: #fff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.6); text-align: center;
        }
        .panel-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #a0b9d9; margin-bottom: 4px; }
        .panel-value { font-size: 28px; font-weight: 900; }
        #streak-panel {
            margin-top: 12px; background: #2b2b0f; border-color: #f5c542;
            color: #fde047; transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute; right: 20px; top: 80px;
        }
        #streak-panel.active { transform: scale(1); opacity: 1; }
        
        .menu-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: #0c1322;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; opacity: 1; transition: opacity 0.4s ease;
        }
        .menu-overlay.hidden { opacity: 0; pointer-events: none; }
        .menu-box {
            background: #172236; border: 2px solid #4e6c9e; 
            padding: 50px 60px; border-radius: 32px; text-align: center; 
            box-shadow: 0 30px 50px #000000; transform: translateY(0); 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden .menu-box { transform: translateY(40px) scale(0.95); }
        
        h1 {
            font-size: 52px; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(to right, #4f9eff, #b380ff, #ff99cc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;
        }
        .subtitle { font-size: 18px; color: #b0c8f0; margin-bottom: 40px; }
        
        .btn {
            background: linear-gradient(135deg, #2d6eff, #9040ff); color: white; border: none;
            padding: 18px 50px; font-size: 20px; font-weight: 700; border-radius: 100px; cursor: pointer;
            box-shadow: 0 10px 30px #4060ff; transition: all 0.2s; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.95); }
        
        .float-text {
            position: absolute; pointer-events: none; font-weight: 900; font-size: 40px; 
            color: #ffdd44; text-shadow: 0 0 20px #ffaa00, 0 4px 10px black; 
            animation: floatAnim 1.2s forwards; z-index: 100;
        }
        @keyframes floatAnim {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.2); }
            20% { opacity: 1; transform: translate(-50%, -30px) scale(1.3); }
            80% { opacity: 1; transform: translate(-50%, -60px) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(0.7); }
        }
        #flash { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: radial-gradient(circle at 50% 50%, #fff6d0, transparent); 
            pointer-events: none; opacity: 0; z-index: 50; mix-blend-mode: overlay;
        }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<div id="flash"></div>

<div id="ui">
    <div id="hud">
        <div class="panel">
            <div class="panel-title">Этажей</div>
            <div class="panel-value" id="val-score">0</div>
        </div>
        <div class="panel">
            <div class="panel-title">Рекорд</div>
            <div class="panel-value" id="val-high">0</div>
        </div>
    </div>
    <div class="panel" id="streak-panel">
        <div class="panel-title">Комбо</div>
        <div class="panel-value" id="val-streak">x0</div>
    </div>
    
    <div id="menu" class="menu-overlay">
        <div class="menu-box">
            <h1 id="menu-title">ПИК</h1>
            <div class="subtitle" id="menu-sub">строй свою высоту</div>
            <button class="btn" id="btn-play">Начать</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });
const dpr = window.devicePixelRatio || 1;

let logicalW, logicalH;
function resize() {
    logicalW = window.innerWidth;
    logicalH = window.innerHeight;
    canvas.width = logicalW * dpr;
    canvas.height = logicalH * dpr;
    canvas.style.width = logicalW + 'px';
    canvas.style.height = logicalH + 'px';
}
window.addEventListener('resize', resize); resize();

const elScore = document.getElementById('val-score'), elHigh = document.getElementById('val-high');
const elStreak = document.getElementById('val-streak'), panStreak = document.getElementById('streak-panel');
const menu = document.getElementById('menu'), elTitle = document.getElementById('menu-title');
const elSub = document.getElementById('menu-sub'), btnPlay = document.getElementById('btn-play');
const flashOverlay = document.getElementById('flash'), uiLayer = document.getElementById('ui');

// Геометрия блоков
const W = 140, H = 80, DX = 25, DY = 18, PERFECT = 5;
const GRAVITY = 1.4; 
const GROUND_Y = 80;

// Условия провала: смещение более 40% ширины блока или выход за фундамент
const FAIL_OFFSET_RATIO = 0.4;
const FUNDAMENT_X = logicalW / 2;

// Цвета для блоков
const PALETTES = [
    { f: '#f8fafc', s: '#cbd5e1', t: '#ffffff', a: '#ea580c', wOn: '#fef08a', wOff: '#0f172a', type: 'stripe' },
    { f: '#1e293b', s: '#0f172a', t: '#334155', a: '#eab308', wOn: '#fde047', wOff: '#000000', type: 'glass' },
    { f: '#9a3412', s: '#7c2d12', t: '#c2410c', a: '#f1f5f9', wOn: '#fef08a', wOff: '#1e1e1e', type: 'brick' },
    { f: '#e7e5e4', s: '#a8a29e', t: '#f5f5f4', a: '#78716c', wOn: '#ffedd5', wOff: '#292524', type: 'panel' },
    { f: '#0f766e', s: '#115e59', t: '#14b8a6', a: '#ecfccb', wOn: '#fef9c3', wOff: '#022c22', type: 'glass' }
];

let state = 'MENU', score = 0, highscore = localStorage.getItem('pik_hs_v12') || 0;
let streak = 0, blocks = [], activeBlock = null;
let lastTime = performance.now(), time = 0;
let particles = [], stars = [], clouds = [], birds = [], bgLayers = [];
let camY = 0, targetCamY = 0, shakeX = 0, shakeY = 0;
let swayAngle = 0, swayVel = 0, towerImbalance = 0;

// Переменные для крана
const MAX_SWING_ANGLE = Math.PI / 4; // 45°
let swingPhase = 0;
const BASE_SWING_SPEED = 0.012;
let swingSpeed = BASE_SWING_SPEED;
const CRANE_OFFSET_Y = 300;          // высота подвеса
const ROPE_LENGTH = 200;              // длина троса
const CRANE_BASE_X = logicalW * 0.7;  // база крана справа

// Замедление времени
let timeScale = 1.0;
let slowMoFrames = 0;

// Бонусы
let bonusDouble = 0;         
let bonusPerfectNext = false; 
let bonusSlowmoTimer = 0;    
let bonusSlowmoActive = false;

elHigh.innerText = highscore;

function rand(min, max) { return Math.random() * (max - min) + min; }
function screenShake(amt) { shakeX = amt; shakeY = amt; }
function screenFlash() {
    flashOverlay.style.opacity = '0.9'; flashOverlay.style.transition = 'none';
    setTimeout(() => { flashOverlay.style.transition = 'opacity 0.5s ease-out'; flashOverlay.style.opacity = '0'; }, 40);
}
function floatText(txt, x, y) {
    const el = document.createElement('div'); el.className = 'float-text'; el.innerText = txt;
    el.style.left = `${x}px`; el.style.top = `${y}px`; uiLayer.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}
function vibrate() {
    if (navigator.vibrate) navigator.vibrate(30);
}

function initEnvironment() {
    stars = Array.from({length: 300}, () => ({ 
        x: rand(0, logicalW*2), y: rand(-logicalH*4, logicalH*0.8), 
        size: rand(1, 3.5), phase: rand(0, Math.PI*2), speed: rand(0.005, 0.02)
    }));
    
    clouds = Array.from({length: 25}, () => ({ 
        x: rand(-300, logicalW+300), y: rand(-logicalH*2, logicalH*0.7), 
        r1: rand(50, 140), r2: rand(40, 100), r3: rand(30, 80),
        spd: rand(0.1, 0.5) * (Math.random()>0.5?1:-1), 
        alpha: rand(0.5, 0.9), offset: rand(0, 10)
    }));
    
    birds = Array.from({length: 6}, () => ({ 
        x: rand(0, logicalW), y: rand(100, logicalH*0.5), 
        vx: rand(1.5, 3.5) * (Math.random()>0.5?1:-1), 
        wing: rand(0, Math.PI*2) 
    }));

    bgLayers = [
        Array.from({length: 12}, () => ({ 
            x: rand(-logicalW*0.5, logicalW*1.8), w: rand(90, 180), h: rand(400, 900), 
            z: 0.08, hue: 220, sat: 6, light: 7, winChance: 0.2, winColor: '#aac8ff'
        })),
        Array.from({length: 10}, () => ({ 
            x: rand(-logicalW*0.3, logicalW*1.6), w: rand(100, 200), h: rand(350, 800), 
            z: 0.16, hue: 215, sat: 10, light: 12, winChance: 0.4, winColor: '#cce0ff'
        })),
        Array.from({length: 9}, () => ({ 
            x: rand(-logicalW*0.2, logicalW*1.4), w: rand(110, 210), h: rand(300, 700), 
            z: 0.27, hue: 210, sat: 14, light: 17, winChance: 0.5, winColor: '#d9e8ff'
        })),
        Array.from({length: 8}, () => ({ 
            x: rand(-logicalW*0.1, logicalW*1.3), w: rand(120, 220), h: rand(250, 600), 
            z: 0.4, hue: 208, sat: 18, light: 23, winChance: 0.6, winColor: '#e6f0ff'
        })),
        Array.from({length: 7}, () => ({ 
            x: rand(-50, logicalW*1.2), w: rand(140, 260), h: rand(200, 500), 
            z: 0.6, hue: 205, sat: 22, light: 30, winChance: 0.7, winColor: '#f0f4ff'
        }))
    ];
}

class Particle {
    constructor(x, y, color, type = 'spark') {
        this.x = x; this.y = y;
        const angle = rand(0, Math.PI * 2), speed = rand(2, 18);
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed - 5;
        this.life = 1; this.color = color; this.size = rand(4, 14);
        this.rot = rand(0, Math.PI); this.rv = rand(-0.3, 0.3);
        this.type = type;
        this.alpha = 1;
    }
    update(ts) { 
        this.x += this.vx * ts; 
        this.y += this.vy * ts; 
        this.vy += (this.type === 'smoke' ? 0.15 : 0.5) * ts; 
        this.rot += this.rv * ts; 
        this.life -= (this.type === 'smoke' ? 0.005 : 0.02) * ts;
        this.alpha = Math.max(0, this.life);
        if (this.type === 'smoke') this.size *= (1 + 0.01 * ts);
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        if (this.type === 'spark') {
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        } else if (this.type === 'smoke') {
            ctx.fillStyle = '#a0b0c0';
            ctx.shadowColor = '#90a0b0'; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.arc(0, 0, this.size*0.7, 0, 2*Math.PI); ctx.fill();
        } else {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.alpha * 0.6;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

class Block {
    constructor(x, y, bonus = null) {
        this.x = x; this.y = y; this.vy = 0; this.state = 'HANGING';
        this.fvx = 0; this.fvy = 0; this.frot = 0; this.rot = 0;
        this.pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
        this.wins = Array.from({length: 15}, () => Math.random() > 0.35);
        this.stripes = Array.from({length: rand(1,3)}, () => ({ x: rand(-W/2+20, W/2-40), w: rand(15, 30) }));
        this.bonus = bonus;
    }
    draw(ctx, swayOffset = 0) {
        ctx.save();
        ctx.translate(this.x + swayOffset, this.y); ctx.rotate(this.rot);

        if (this.bonus) {
            ctx.shadowColor = this.bonus === 'slowmo' ? '#00aaff' : (this.bonus === 'double' ? '#ffaa00' : '#ffd700');
            ctx.shadowBlur = 30;
        }

        ctx.fillStyle = this.pal.t; ctx.beginPath(); 
        ctx.moveTo(-W/2, 0); ctx.lineTo(-W/2-DX, -DY);
        ctx.lineTo(W/2-DX, -DY); ctx.lineTo(W/2, 0); ctx.closePath(); ctx.fill();
        
        if(this.state !== 'LANDED') {
            ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(-DX/2 - 15, -DY/2 - 8, 12, 6);
        }

        ctx.fillStyle = this.pal.s; ctx.beginPath(); 
        ctx.moveTo(-W/2, 0); ctx.lineTo(-W/2-DX, -DY);
        ctx.lineTo(-W/2-DX, H-DY); ctx.lineTo(-W/2, H); ctx.closePath(); ctx.fill();

        ctx.fillStyle = this.pal.f; ctx.fillRect(-W/2, 0, W, H+0.5);
        if(this.pal.type !== 'glass') { 
            ctx.fillStyle = this.pal.a; this.stripes.forEach(s => ctx.fillRect(s.x, 0, s.w, H+0.5)); 
        }

        let idx = 0;
        for(let ix=0; ix<5; ix++) {
            for(let iy=0; iy<3; iy++) {
                const wx = -W/2 + 10 + ix*25, wy = 10 + iy*24;
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(wx-2, wy-2, 20, 18);
                ctx.fillStyle = this.wins[idx++] ? this.pal.wOn : this.pal.wOff; ctx.fillRect(wx, wy, 16, 14);
                if(this.pal.type === 'glass' && this.wins[idx-1]) { 
                    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(wx, wy, 5, 14); 
                }
            }
        }
        
        const shd = ctx.createLinearGradient(0,0,0,12); 
        shd.addColorStop(0,'rgba(0,0,0,0.6)'); shd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle = shd; ctx.fillRect(-W/2, 0, W, 12);
        
        const rightShd = ctx.createLinearGradient(W/2-12,0,W/2,0); 
        rightShd.addColorStop(0,'rgba(0,0,0,0)'); rightShd.addColorStop(1,'rgba(0,0,0,0.45)');
        ctx.fillStyle = rightShd; ctx.fillRect(W/2-12, 0, 12, H+0.5);
        
        if (this.bonus) {
            ctx.shadowBlur = 0;
            ctx.font = 'bold 24px "Montserrat"';
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 10;
            ctx.fillText(this.bonus === 'slowmo' ? '⏱' : (this.bonus === 'double' ? 'x2' : '★'), -20, -20);
        }
        ctx.restore();
    }
}

function getSwayOffset(index) {
    if (blocks.length <= 1) return 0;
    return Math.sin(swayAngle) * Math.pow(index / (blocks.length - 1), 1.5) * 25;
}

function activateBonus(type) {
    switch(type) {
        case 'slowmo':
            bonusSlowmoActive = true;
            bonusSlowmoTimer = 5.0;
            timeScale = 0.5;
            floatText('ЗАМЕДЛЕНИЕ!', window.innerWidth/2, window.innerHeight/2);
            screenFlash();
            vibrate();
            break;
        case 'double':
            bonusDouble += 3;
            floatText('УДВОЕНИЕ!', window.innerWidth/2, window.innerHeight/2);
            screenFlash();
            vibrate();
            break;
        case 'perfect':
            bonusPerfectNext = true;
            floatText('ИДЕАЛЬНЫЙ!', window.innerWidth/2, window.innerHeight/2);
            screenFlash();
            vibrate();
            break;
    }
}

function startGame() {
    score = 0; streak = 0; towerImbalance = 0; swayAngle = 0; swayVel = 0; camY = 0; targetCamY = 0; time = 0;
    swingPhase = 0; swingSpeed = BASE_SWING_SPEED; timeScale = 1.0; slowMoFrames = 0;
    bonusDouble = 0; bonusPerfectNext = false; bonusSlowmoActive = false; bonusSlowmoTimer = 0;
    particles = []; blocks = [];
    elScore.innerText = '0'; elStreak.innerText = 'x0'; panStreak.classList.remove('active');
    initEnvironment();
    
    const base = new Block(logicalW/2, logicalH - GROUND_Y); base.state = 'LANDED'; blocks.push(base);
    spawnBlock(); state = 'PLAY'; menu.classList.add('hidden');
}

function spawnBlock() {
    let bonus = null;
    if (Math.random() < 0.05) {
        const r = Math.random();
        if (r < 0.33) bonus = 'slowmo';
        else if (r < 0.66) bonus = 'double';
        else bonus = 'perfect';
    }
    activeBlock = new Block(logicalW/2, 0, bonus);
}

function handleDrop(e) {
    e.preventDefault();
    if (state === 'PLAY' && activeBlock && activeBlock.state === 'HANGING') {
        activeBlock.state = 'FALLING';
        vibrate();
    }
}

function evaluatePlacement() {
    const top = blocks[blocks.length - 1];
    const drop = activeBlock;
    const visualTopX = top.x + getSwayOffset(blocks.length - 1);
    let offset = drop.x - visualTopX;
    const fundX = blocks[0].x;
    const halfW = W / 2;

    if (bonusPerfectNext) {
        offset = 0;
        bonusPerfectNext = false;
    }

    if (Math.abs(offset) > FAIL_OFFSET_RATIO * W || drop.x < fundX - halfW || drop.x > fundX + halfW) {
        blocks.push(drop); activeBlock = null; 
        triggerCollapse(offset > 0 ? 1 : -1);
        return;
    }

    const perfect = Math.abs(offset) <= PERFECT;
    let pointsEarned = 0;
    if (perfect) {
        streak++; 
        pointsEarned = Math.min(streak, 5);
    } else {
        streak = 0; 
        pointsEarned = 1;
    }
    if (bonusDouble > 0) {
        pointsEarned *= 2;
        bonusDouble--;
    }
    score += pointsEarned;

    if (perfect) {
        timeScale = 0.3;
        slowMoFrames = 8;
        screenFlash(); screenShake(8);
        for(let i=0;i<45;i++) {
            let col = i%2===0 ? '#ffdd55' : '#ffaa22';
            particles.push(new Particle(drop.x, drop.y+H, col, 'spark'));
        }
        for(let i=0;i<12;i++) particles.push(new Particle(drop.x, drop.y+H, '#eeddbb', 'smoke'));
        floatText('ИДЕАЛЬНО!', (drop.x/logicalW)*window.innerWidth, (drop.y-camY)/logicalH*window.innerHeight - 40);
        panStreak.classList.add('active'); elStreak.innerText = `x${streak}`;
        towerImbalance *= 0.5; swayVel *= 0.3; 
        vibrate(); vibrate();
    } else {
        drop.x = top.x + offset;
        panStreak.classList.remove('active');
        for(let i=0;i<25;i++) {
            particles.push(new Particle(drop.x, drop.y+H, '#a0b0c0', i%3===0?'smoke':'spark'));
        }
        towerImbalance += offset; swayVel += offset * 0.01;
        vibrate();
    }
    
    elScore.innerText = score; blocks.push(drop); activeBlock = null;

    if (drop.bonus) {
        activateBonus(drop.bonus);
    }

    swingSpeed = BASE_SWING_SPEED * (1 + 0.12 * Math.floor(score / 5));

    for (let i = blocks.length - 1; i > 0; i--) {
        let m = 0, c = 0;
        for (let j = i; j < blocks.length; j++) { m++; c += blocks[j].x; }
        if (Math.abs((c/m) - blocks[i-1].x) > W/2 * 0.85) { triggerCollapse((c/m) > blocks[i-1].x ? 1 : -1); return; }
    }
    setTimeout(spawnBlock, 280);
}

function triggerCollapse(dir) {
    state = 'OVER'; screenShake(35);
    if (score > highscore) { highscore = score; localStorage.setItem('pik_hs_v12', highscore); elHigh.innerText = highscore; }
    blocks.forEach((b, i) => {
        if (i === 0) return;
        b.fvx = dir * rand(5, 18) * (i/blocks.length); b.vy = rand(-16, -6); b.frot = dir * rand(0.07, 0.25);
    });
    for(let i=0;i<60;i++) {
        let col = rand(0,1)>0.5 ? '#b0a090' : '#c0b0a0';
        particles.push(new Particle(blocks[blocks.length-1].x, blocks[blocks.length-1].y, col, 'spark'));
        particles.push(new Particle(blocks[blocks.length-1].x, blocks[blocks.length-1].y, '#a0a0a0', 'smoke'));
    }
    setTimeout(() => {
        elTitle.innerHTML = 'ПИК'; 
        elSub.innerText = `Построено: ${score} · Рекорд: ${highscore}`;
        btnPlay.innerText = 'Заново'; menu.classList.remove('hidden');
    }, 1600);
}

function update(dt) {
    dt = dt * timeScale;
    const ts = dt / 16.666;

    if (slowMoFrames > 0) {
        slowMoFrames--;
        if (slowMoFrames === 0) timeScale = 1.0;
    }

    if (bonusSlowmoActive) {
        bonusSlowmoTimer -= dt / 1000;
        if (bonusSlowmoTimer <= 0) {
            bonusSlowmoActive = false;
            timeScale = 1.0;
        }
    }

    if (state === 'PLAY') {
        time += dt;
        swingPhase += swingSpeed * ts;

        if (blocks.length > 1) {
            swayVel += (-swayAngle * 0.05 + towerImbalance * 0.0005) * ts;
            swayVel *= Math.pow(0.7, ts);
            swayAngle += swayVel * ts * 1.5;
        }
    }
    
    if (blocks.length > 0 && state !== 'OVER') {
        targetCamY = Math.max(0, (logicalH * 0.55) - blocks[blocks.length - 1].y);
        camY += (targetCamY - camY) * 0.12 * ts;
    }
    shakeX *= Math.pow(0.7, ts); shakeY *= Math.pow(0.7, ts);

    if (blocks.length > 0) {
        const topBlock = blocks[blocks.length - 1];
        const hookX = logicalW / 2;
        const hookY = topBlock.y - CRANE_OFFSET_Y;
        const angle = MAX_SWING_ANGLE * Math.sin(swingPhase);
        
        if (activeBlock) {
            if (activeBlock.state === 'HANGING') {
                activeBlock.x = hookX + ROPE_LENGTH * Math.sin(angle);
                activeBlock.y = hookY + ROPE_LENGTH * Math.cos(angle);
            } else if (activeBlock.state === 'FALLING') {
                activeBlock.vy += GRAVITY * ts;
                if(activeBlock.vy > H*0.9) activeBlock.vy = H*0.9; 
                let nextY = activeBlock.y + activeBlock.vy * ts;
                
                if (nextY + H >= topBlock.y) {
                    activeBlock.y = topBlock.y - H; activeBlock.state = 'LANDED'; evaluatePlacement();
                } else { activeBlock.y = nextY; }
            }
        }
    }

    if (state === 'OVER') {
        blocks.forEach((b, i) => {
            if (i > 0) { b.vy += GRAVITY * 1.2 * ts; b.x += b.fvx * ts; b.y += b.vy * ts; b.rot += b.frot * ts; }
        });
    }

    particles.forEach((p, i) => { p.update(ts); if (p.life <= 0) particles.splice(i, 1); });
    birds.forEach(b => { 
        b.x += b.vx * ts; b.wing += 0.15 * ts; 
        if(b.x > logicalW+80) b.x = -80; else if (b.x < -80) b.x = logicalW+80; 
    });
    stars.forEach(s => { s.phase += s.speed * ts; });
}

function drawBackground(ctx, skyProg) {
    const grad = ctx.createLinearGradient(0, 0, 0, logicalH);
    grad.addColorStop(0, `rgb(${30-skyProg*20}, ${60-skyProg*40}, ${140-skyProg*90})`);
    grad.addColorStop(1, `rgb(${100-skyProg*60}, ${160-skyProg*100}, ${220-skyProg*120})`);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, logicalW, logicalH);

    ctx.save(); ctx.translate(0, camY * 0.25);
    
    ctx.fillStyle = `rgba(0, 0, 0, 0.3)`;
    ctx.fillRect(0, 0, logicalW, logicalH);

    stars.forEach(s => {
        let br = 0.5 + 0.3 * Math.sin(s.phase + time*0.003);
        ctx.fillStyle = `rgba(255, 250, 210, ${br * (1 - skyProg*0.7)})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size * br, 0, Math.PI*2); ctx.fill();
    });

    ctx.shadowColor = '#ffffff20'; ctx.shadowBlur = 30;
    clouds.forEach(c => {
        let cx = c.x + c.spd * time * 0.02;
        if(cx > logicalW+400) cx = -400; else if(cx < -400) cx = logicalW+400;
        ctx.fillStyle = `rgba(220, 220, 240, ${c.alpha * (1 - skyProg*0.5)})`;
        ctx.beginPath(); 
        ctx.arc(cx, c.y + camY * 0.05, c.r1, 0, 2*Math.PI);
        ctx.arc(cx + c.r2*0.6, c.y - c.r2*0.2, c.r2, 0, 2*Math.PI);
        ctx.arc(cx + c.r3*1.2, c.y + c.r3*0.1, c.r3, 0, 2*Math.PI);
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    bgLayers.forEach((layer, idx) => {
        layer.forEach(b => {
            let bx = b.x + camY * b.z * 0.18;
            let by = logicalH - GROUND_Y - b.h + camY * (b.z * 0.6);
            ctx.fillStyle = `hsl(${b.hue}, ${b.sat}%, ${b.light}%)`;
            ctx.fillRect(bx, by, b.w, b.h);
            
            for(let i=0; i<4; i++) {
                for(let j=0; j<12; j++) {
                    if (Math.random() < b.winChance * 0.5) {
                        let winX = bx + 20 + i*(b.w/4.5);
                        let winY = by + 18 + j*20;
                        let flicker = 0.4 + 0.2 * Math.sin(time*0.01 + i*5 + j*3);
                        ctx.fillStyle = `rgba(200, 220, 255, ${flicker})`;
                        ctx.fillRect(winX, winY, 10, 14);
                    }
                }
            }
        });
    });

    ctx.restore();
}

function drawGround() {
    const groundY = logicalH - GROUND_Y + H;
    // Земля
    ctx.fillStyle = '#2d3e2d';
    ctx.fillRect(0, groundY, logicalW, logicalH - groundY);
    
    for (let i = 0; i < 200; i++) {
        ctx.fillStyle = `rgba(70, 90, 40, ${Math.random() * 0.2})`;
        ctx.fillRect(rand(0, logicalW), rand(groundY, logicalH), 5, 5);
    }
    
    ctx.strokeStyle = '#3f5a3f';
    ctx.lineWidth = 2;
    for (let i = 0; i < logicalW; i += 25) {
        ctx.beginPath();
        ctx.moveTo(i, groundY);
        ctx.lineTo(i + 12, groundY - 12);
        ctx.stroke();
    }
    
    ctx.fillStyle = '#5a5a5a';
    for (let i = 0; i < 30; i++) {
        ctx.beginPath();
        ctx.arc(rand(0, logicalW), rand(groundY, groundY + 30), rand(2, 6), 0, 2 * Math.PI);
        ctx.fill();
    }
    
    // Фундамент (бетонная плита) - растянут на всю ширину
    ctx.fillStyle = '#5a6b7a';
    ctx.fillRect(0, groundY - 15, logicalW, 25);
    // Тени на плите
    ctx.fillStyle = '#3f4f5f';
    ctx.fillRect(0, groundY - 15, logicalW, 5);
    ctx.fillRect(0, groundY - 5, logicalW, 5);
    // Текстура бетона (шум)
    for (let i = 0; i < 100; i++) {
        ctx.fillStyle = `rgba(100, 110, 120, ${Math.random() * 0.5})`;
        ctx.fillRect(rand(0, logicalW), groundY - 10 + rand(0, 15), 8, 4);
    }
    // Трещины
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 100 + 20, groundY - 8);
        ctx.lineTo(i * 100 + 50, groundY - 2);
        ctx.stroke();
    }
}

function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const skyProg = Math.min(1, score / 50);
    drawBackground(ctx, skyProg);

    ctx.translate(shakeX * rand(-1, 1), shakeY * rand(-1, 1) + camY);
    
    drawGround();

    blocks.forEach((b, i) => b.draw(ctx, getSwayOffset(i)));

    // Улучшенный компактный кран с правильными соединениями
    if (state === 'PLAY' && blocks.length > 0) {
        const topBlock = blocks[blocks.length - 1];
        const hookY = topBlock.y - CRANE_OFFSET_Y;       // высота оголовка
        const groundY = logicalH - GROUND_Y + H;
        const baseX = CRANE_BASE_X;

        // --- Мачта (решетчатая) ---
        ctx.fillStyle = '#6b7f8f';
        ctx.fillRect(baseX - 12, groundY, 24, hookY - groundY + 20);
        // Поперечные балки
        ctx.fillStyle = '#8a9aaa';
        for (let y = groundY; y < hookY; y += 30) {
            ctx.fillRect(baseX - 20, y, 40, 4);
        }

        // --- Оголовок (поворотная платформа) ---
        ctx.fillStyle = '#a0b0c0';
        ctx.fillRect(baseX - 35, hookY - 15, 70, 20);
        // Кабина оператора
        ctx.fillStyle = '#88a0b0';
        ctx.fillRect(baseX - 25, hookY - 45, 30, 30);
        ctx.fillStyle = '#c0d0e0';
        ctx.fillRect(baseX - 22, hookY - 42, 24, 24);
        ctx.fillStyle = '#2f4050';
        ctx.fillRect(baseX - 18, hookY - 38, 16, 12);
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(baseX - 14, hookY - 36, 4, 4);
        ctx.globalAlpha = 1;

        // --- Стрела (идёт от оголовка до точки подвеса) ---
        const стрелаНачX = baseX + 10;
        const стрелаКонX = logicalW / 2;  // точка подвеса
        // Верхний пояс стрелы
        ctx.strokeStyle = '#b0c0d0';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(стрелаНачX, hookY - 15);
        ctx.lineTo(стрелаКонX, hookY - 15);
        ctx.stroke();
        // Нижний пояс (параллельная линия)
        ctx.strokeStyle = '#90a0b0';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(стрелаНачX, hookY - 5);
        ctx.lineTo(стрелаКонX, hookY - 5);
        ctx.stroke();
        // Вертикальные раскосы
        ctx.strokeStyle = '#a0b0c0';
        ctx.lineWidth = 2;
        for (let x = стрелаНачX; x < стрелаКонX; x += 20) {
            ctx.beginPath();
            ctx.moveTo(x, hookY - 15);
            ctx.lineTo(x + 10, hookY - 5);
            ctx.stroke();
        }

        // --- Точка подвеса (ролик) ---
        ctx.fillStyle = '#d0a050';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#000';
        ctx.beginPath();
        ctx.arc(стрелаКонX, hookY - 10, 10, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#b08030';
        ctx.beginPath();
        ctx.arc(стрелаКонX, hookY - 10, 5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 0;

        // --- Противовес (сзади мачты) ---
        ctx.fillStyle = '#5a6a7a';
        ctx.beginPath();
        ctx.ellipse(baseX + 35, hookY - 20, 25, 15, 0, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#3a4a5a';
        ctx.beginPath();
        ctx.ellipse(baseX + 30, hookY - 22, 18, 10, 0, 0, 2 * Math.PI);
        ctx.fill();

        if (activeBlock) {
            // --- Трос (идёт от ролика до крюка) ---
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(стрелаКонX, hookY - 10);
            ctx.lineTo(activeBlock.x, activeBlock.y - 12);
            ctx.stroke();
            // Тень троса
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(стрелаКонX + 2, hookY - 8);
            ctx.lineTo(activeBlock.x + 2, activeBlock.y - 10);
            ctx.stroke();

            // --- Крюк ---
            ctx.fillStyle = '#b87333';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(activeBlock.x, activeBlock.y - 12, 8, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#8b5a2b';
            ctx.beginPath();
            ctx.arc(activeBlock.x, activeBlock.y - 12, 4, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Тень на верхнем блоке
            if (activeBlock.state === 'HANGING') {
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#000';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.ellipse(activeBlock.x, topBlock.y - H/2, W/2, H/4, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
            }

            activeBlock.draw(ctx, 0);
        }
    }

    // Птицы
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 5;
    ctx.shadowColor = '#000';
    birds.forEach(b => {
        let wy = Math.sin(b.wing) * 8;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.quadraticCurveTo(b.x + 8, b.y - 8 + wy, b.x + 16, b.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.quadraticCurveTo(b.x - 8, b.y - 8 + wy, b.x - 16, b.y);
        ctx.stroke();
    });
    ctx.shadowBlur = 0;

    particles.forEach(p => p.draw(ctx));
}

function loop(timestamp) {
    let dt = timestamp - lastTime; if (dt > 100) dt = 16.666; lastTime = timestamp;
    update(dt); draw(); requestAnimationFrame(loop);
}

canvas.addEventListener('touchstart', handleDrop, { passive: false });
canvas.addEventListener('mousedown', handleDrop);
btnPlay.addEventListener('click', e => { e.stopPropagation(); startGame(); });

initEnvironment(); requestAnimationFrame(loop);
</script>
</body>
